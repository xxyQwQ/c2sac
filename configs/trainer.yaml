defaults:
  - _self_
  - agent: bc
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

checkpoint: ./checkpoints/${agent.name}/all-${setting.dataset_name}/seed-${seed}
device: gpu
seed: 0

setting:
  dataset_root: ./datasets
  dataset_name: medium
  task_names: [walk, run]
  state_dims: 24
  action_dims: 6

strategy:
  num_epochs: 1000
  warmup_epochs: 0
  batch_size: 1024
  eval_interval: 10
  sample_episodes: 5
  share_interval: 100
  rank_percentage: 0.05

logging:
  use_wandb: true
  entity: VisualCamp
  project: c2sac
  run_name: ${agent.name}-all-${setting.dataset_name}-seed-${seed}

hydra:
  run:
    dir: ${checkpoint}
  sweep:
    dir: ${checkpoint}
